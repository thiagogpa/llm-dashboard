name: Refresh data

on:
  schedule:
    - cron: '0 3 * * 0'  # Sunday 3am UTC
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Fetch prices
        run: python3 refresh/fetch_prices.py

      - name: Fetch quality
        env:
          LLM_STATS_API_KEY: ${{ secrets.LLM_STATS_API_KEY }}
        run: python3 refresh/fetch_quality.py

      - name: Build models.json
        run: python3 refresh/build_data.py

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/models.json
          git diff --staged --quiet || git commit -m "chore: weekly data refresh [skip ci]"
          git push
